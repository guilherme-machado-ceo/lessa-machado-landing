<!DOCTYPE html>
<html lang="pt" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lessa Machado Negócios &amp; Cia</title>

  <meta
    name="description"
    content="Paradiplomacia digital, advocacy lícito, marketing geopolítico e estratégia institucional orientada a compliance, governança e risco."
  >

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #0d0d0d;
      --paper: #f8f7f4;
      --paper-dark: #ece9e2;
      --accent: #1a1a2e;
      --muted: #6b6b6b;
      --line: #dfdcd5;

      --serif: Georgia, "Times New Roman", serif;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      --radius: 2px;
      --max: 820px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.7;
    }

    /* Idiomas */

    #lang-bar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 16px;
      background: var(--accent);
    }

    #lang-bar .lang-label {
      margin-right: 6px;
      color: rgba(255, 255, 255, 0.42);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .lang-btn {
      padding: 3px 9px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius);
      background: transparent;
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: 0.2s ease;
    }

    .lang-btn:hover,
    .lang-btn.active {
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }

    /* Estrutura */

    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 100px 24px 80px;
    }

    section {
      padding: 60px 0;
      border-bottom: 1px solid var(--line);
    }

    section:last-of-type {
      border-bottom: 0;
    }

    /* Cabeçalho institucional */

    .brand-header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--line);
    }

    .header-monogram {
      width: 45px;
      height: 45px;
      flex: 0 0 45px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      color: var(--accent);
      font-family: var(--serif);
      font-size: clamp(19px, 2.8vw, 27px);
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.15;
    }

    .brand-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    /* Hero */

    .hero {
      padding: 56px 0 64px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 650px;
      margin-bottom: 22px;
      color: var(--accent);
      font-family: var(--serif);
      font-size: clamp(27px, 4.8vw, 47px);
      font-weight: 400;
      line-height: 1.2;
    }

    h1 em {
      border-bottom: 1px solid var(--accent);
      font-style: normal;
    }

    .lead {
      max-width: 570px;
      margin-bottom: 34px;
      color: var(--muted);
      font-size: clamp(15px, 1.7vw, 18px);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-primary,
    .btn-ghost {
      display: inline-block;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
      transition: 0.2s ease;
    }

    .btn-primary {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      opacity: 0.82;
    }

    .btn-ghost {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
    }

    .btn-ghost:hover {
      background: var(--accent);
      color: #ffffff;
    }

    /* Conteúdo */

    h2 {
      margin-bottom: 30px;
      color: var(--accent);
      font-family: var(--serif);
      font-size: clamp(20px, 2.9vw, 28px);
      font-weight: 400;
    }

    h3 {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    p {
      max-width: 650px;
      margin-bottom: 14px;
      color: var(--muted);
    }

    /* Serviços */

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .service-card {
      min-height: 250px;
      padding: 28px 22px;
      background: var(--paper);
      transition: background 0.2s ease;
    }

    .service-card:hover {
      background: #f1eee8;
    }

    .service-card .icon {
      display: block;
      margin-bottom: 14px;
      font-size: 20px;
    }

    .service-card h3 {
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 11px;
    }

    .service-card p {
      margin: 0;
      font-size: 13px;
    }

    /* Card cinza — logomarca LM */

    .logo-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      padding: 34px 26px;
      background: var(--paper-dark);
    }

    .logo-card:hover {
      background: var(--paper-dark);
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--accent);
    }

    .logo-monogram {
      width: 74px;
      height: 74px;
      flex: 0 0 74px;
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .logo-name {
      color: var(--accent);
      font-family: var(--serif);
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 400;
      letter-spacing: 0.005em;
      line-height: 1.08;
      white-space: nowrap;
    }

    .logo-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.24em;
      line-height: 1.3;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Tríplice hélice */

    .helix-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-bottom: 26px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .helix-cell {
      padding: 24px 18px;
      background: var(--paper);
      text-align: center;
    }

    .h-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .h-title {
      color: var(--accent);
      font-family: var(--serif);
      font-size: 15px;
    }

    .helix-note {
      max-width: 630px;
      color: var(--muted);
      font-size: 13px;
    }

    /* Tags de blocos econômicos */

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Contato */

    .contact-block {
      max-width: 500px;
      padding: 40px 36px;
      border-radius: var(--radius);
      background: var(--accent);
    }

    .contact-block h3 {
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.52);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .contact-block a {
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      font-family: var(--serif);
      font-size: clamp(14px, 2vw, 18px);
      text-decoration: none;
      word-break: break-word;
    }

    .contact-block a:hover {
      border-color: #ffffff;
    }

    .contact-note {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.52);
      font-size: 12px;
    }

    /* Rodapé */

    footer {
      padding: 36px 0 20px;
      border-top: 1px solid var(--line);
    }

    .footer-grid {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 24px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-brand-name {
      color: var(--accent);
      font-family: var(--serif);
      font-size: 15px;
    }

    .footer-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .footer-links a {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--ink);
    }

    /* Internacionalização */

    [data-lang] {
      display: none;
    }

    [data-lang].active {
      display: block;
    }

    .inline-lang {
      display: none;
    }

    .inline-lang.active {
      display: inline;
    }

    /* Responsividade */

    @media (max-width: 520px) {
      .brand-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .helix-row {
        grid-template-columns: 1fr;
      }

      .logo-card {
        min-height: 215px;
        padding: 28px 18px;
      }

      .logo-lockup {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .logo-wordmark {
        align-items: center;
      }

      .logo-name,
      .logo-subtitle {
        white-space: normal;
      }
    }
  </style>
</head>
